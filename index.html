<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Quiz Lab</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

    <div id="auth-page" class="page">
        <div class="auth-container">
            <div id="login-form">
                <h2>Вход в систему</h2>
                <input type="text" id="auth-login" placeholder="Логин">
                <input type="password" id="auth-password" placeholder="Пароль">
                <div class="auth-buttons">
                    <button onclick="handleLogin('student')" style="background: #1a73e8; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">Войти как ученик</button>
                    <button onclick="handleLogin('admin')" style="background: #333; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">Войти как учитель</button>
                </div>
                <p style="margin-top:15px; font-size:14px;">
                    Нет аккаунта? <a href="#" onclick="toggleAuth(true)">Зарегистрироваться</a>
                </p>
            </div>

            <div id="register-form" class="hidden">
                <h2>Регистрация</h2>
                <input type="text" id="reg-login" placeholder="Придумайте логин">
                <input type="password" id="reg-password" placeholder="Придумайте пароль">
                <button onclick="handleRegister()" class="main-btn">Создать аккаунт</button>
                <p style="margin-top:15px; font-size:14px;">
                    Уже есть аккаунт? <a href="#" onclick="toggleAuth(false)">Войти</a>
                </p>
            </div>
        </div>
    </div>

    <div id="main-page" class="page hidden">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Мои тесты</h1>
            <button onclick="location.reload()" style="background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 5px;">Выйти</button>
        </header>
        
        <div class="container">
            <section class="editor" id="admin-editor">
                <h3>Создать новый тест</h3>
                <input type="text" id="quiz-title" placeholder="Название теста">
                <textarea id="quiz-raw-input" placeholder="Формат:
Question Условие
Option1 Вариант
Option2 Вариант true"></textarea>
                <button onclick="handleSaveQuiz()" class="main-btn">Сохранить в облако</button>
            </section>

            <section class="library">
                <h3>Доступные тесты</h3>
                <div id="quiz-list"></div>
            </section>
        </div>
    </div>

    <div id="quiz-page" class="page hidden">
        <div class="quiz-header">
            <button onclick="showPage('main-page')" class="back-btn">← Назад</button>
            <h2 id="current-quiz-title">Название теста</h2>
            <div class="settings-panel">
                <label class="switch-label"><input type="checkbox" id="instant-check"> Показывать ответ сразу</label>
                <label class="switch-label"><input type="checkbox" id="lyceum-mode"> Режим «90 лицей» (+4/-1)</label>
            </div>
        </div>
        <div id="questions-container"></div>
        <button id="submit-btn" class="main-btn" onclick="checkFullQuiz()">Сдать тест</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
